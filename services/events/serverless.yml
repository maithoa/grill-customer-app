service: grill-customers-events

frameworkVersion: '4'

provider:
  name: aws
  runtime: nodejs20.x
  stage: ${opt:stage, 'local'}
  region: ${env:AWS_REGION, 'eu-north-1'}
  httpApi:
    cors:
      allowedOrigins:
        - https://dev.d2bozy8x7zs48w.amplifyapp.com
        - https://master.d2bozy8x7zs48w.amplifyapp.com
      allowedMethods:
        - GET
        - OPTIONS
      allowedHeaders:
        - Content-Type
        - Authorization
      allowCredentials: true
  environment:
    SUPABASE_URL: ${env:SUPABASE_URL, ssm:/grill-customers/supabase-url}
    SUPABASE_ANON_KEY: ${env:SUPABASE_ANON_KEY, ssm:/grill-customers/supabase-anon-key}

functions:
  listEvents:
    handler: handler.listEvents
    timeout: 10
    # PRD concurrency target for Events Lambda.
    provisionedConcurrency: 10
    reservedConcurrency: 200
    events:
      - httpApi:
          method: GET
          path: /events

plugins:
  - serverless-offline

custom:
  serverless-offline:
    httpPort: 3001
