name: CI

on:
  push:
    branches:
      - master
      - dev
  pull_request:
    branches:
      - master
      - dev

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      # CI build uses safe placeholders so lint/type/build can run without production secrets.
      SUPABASE_URL: https://example.supabase.co
      SUPABASE_ANON_KEY: ci-anon-key-placeholder
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-anon-key-placeholder
      AUTH_SERVICE_URL: http://localhost:4000
      NEXT_PUBLIC_AUTH_SERVICE_URL: http://localhost:4000
      EVENTS_API_BASE_URL: http://localhost:3001
      SIGNUPS_API_BASE_URL: http://localhost:4200
      NEXT_PUBLIC_EVENTS_API_BASE_URL: http://localhost:3001
      NEXT_PUBLIC_SIGNUPS_API_BASE_URL: http://localhost:4200
      SESSION_SECRET: ci-session-secret-placeholder-1234567890

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
